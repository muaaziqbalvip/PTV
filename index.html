<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiTV 24/7 Stream Control Panel</title>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-database.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: linear-gradient(90deg, #00ff99 0%, #00d4ff 100%);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 255, 153, 0.3);
            color: #1a1a2e;
        }

        header h1 {
            font-size: 28px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 14px;
            background: #ff6b6b;
            color: white;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            animation: pulse 2s infinite;
        }

        .status-badge.online {
            background: #51cf66;
            animation: glow 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 10px #51cf66; }
            50% { box-shadow: 0 0 20px #51cf66; }
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 25px;
        }

        @media (max-width: 1024px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: rgba(30, 30, 46, 0.8);
            border: 1px solid #00ff99;
            border-radius: 12px;
            padding: 22px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .panel h2 {
            font-size: 18px;
            color: #00ff99;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 2px solid #00ff99;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #a0a0a0;
            margin-bottom: 6px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="number"],
        input[type="color"],
        input[type="range"],
        select,
        textarea {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #00ff99;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 13px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        input[type="color"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            background: rgba(0, 255, 153, 0.1);
            border-color: #00d4ff;
            box-shadow: 0 0 10px rgba(0, 255, 153, 0.3);
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn {
            padding: 11px 18px;
            background: linear-gradient(90deg, #00ff99 0%, #00d4ff 100%);
            color: #1a1a2e;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 255, 153, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn.danger {
            background: linear-gradient(90deg, #ff6b6b 0%, #ff4757 100%);
            color: white;
        }

        .btn.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #00ff99;
            border: 1px solid #00ff99;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .video-list {
            max-height: 300px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 12px;
        }

        .video-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: rgba(0, 255, 153, 0.1);
            border-left: 3px solid #00ff99;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 12px;
            gap: 8px;
        }

        .video-item span {
            flex: 1;
            word-break: break-all;
            color: #00ff99;
        }

        .video-item .delete-btn {
            padding: 5px 10px;
            font-size: 11px;
        }

        .color-input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .color-input-wrapper input[type="color"] {
            width: 50px;
            height: 40px;
            padding: 2px;
            cursor: pointer;
        }

        .color-input-wrapper input[type="text"] {
            flex: 1;
        }

        .range-display {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .range-display input[type="range"] {
            flex: 1;
        }

        .range-value {
            min-width: 50px;
            text-align: right;
            color: #00ff99;
            font-weight: 600;
        }

        .toggle {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(0, 255, 153, 0.1);
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .toggle input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #00ff99;
        }

        .toggle label {
            margin: 0;
            flex: 1;
            cursor: pointer;
        }

        .status-text {
            font-size: 12px;
            color: #a0a0a0;
            margin-top: 8px;
            padding: 8px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
            border-left: 2px solid #00ff99;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #00ff99;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .preview-box {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #00ff99;
            border-radius: 8px;
            padding: 12px;
            margin-top: 12px;
            font-size: 12px;
            color: #00ff99;
            max-height: 150px;
            overflow-y: auto;
        }

        .error {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid #ff6b6b;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 12px;
            font-size: 12px;
        }

        .success {
            color: #51cf66;
            background: rgba(81, 207, 102, 0.1);
            border: 1px solid #51cf66;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 12px;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .input-row {
                grid-template-columns: 1fr;
            }
            
            header h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header>
            <h1>
                🎬 MiTV 24/7 Stream Control
                <span class="status-badge" id="statusBadge">OFFLINE</span>
            </h1>
            <p style="font-size: 13px; opacity: 0.8;">Real-time Firebase Configuration • Edit Live While Streaming</p>
        </header>

        <div class="grid">
            <!-- VIDEO URLS PANEL -->
            <div class="panel">
                <h2>📹 Video URLs (MP4/M3U/YouTube)</h2>
                
                <div class="form-group">
                    <label>Add Video Link</label>
                    <div class="input-row">
                        <input type="text" id="videoUrl" placeholder="https://example.com/video.mp4 or YouTube link">
                        <button class="btn" onclick="addVideo()">➕ Add</button>
                    </div>
                    <div class="status-text" id="videoStatus"></div>
                </div>

                <div class="video-list" id="videoList">
                    <p style="color: #a0a0a0; text-align: center; padding: 20px;">No videos added yet</p>
                </div>

                <button class="btn secondary" onclick="downloadYouTubeAsMP4()" style="width: 100%; margin-top: 12px;">
                    🎥 Auto-Convert YouTube → MP4
                </button>
            </div>

            <!-- LOGO PANEL -->
            <div class="panel">
                <h2>✨ Logo & Effects</h2>

                <div class="toggle">
                    <input type="checkbox" id="logoEnabled" onchange="updateConfig()">
                    <label for="logoEnabled">Enable Logo Overlay</label>
                </div>

                <div class="form-group">
                    <label>Logo URL / Path</label>
                    <input type="text" id="logoPath" placeholder="logo.png or https://..." onchange="updateConfig()">
                </div>

                <div class="form-group">
                    <label>Logo Position</label>
                    <select id="logoPosition" onchange="updateConfig()">
                        <option value="top-right">↗ Top Right</option>
                        <option value="top-left">↖ Top Left</option>
                        <option value="bottom-right">↘ Bottom Right</option>
                        <option value="bottom-left">↙ Bottom Left</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Logo Width (px)</label>
                    <div class="range-display">
                        <input type="range" id="logoWidth" min="50" max="400" value="180" onchange="updateConfig()">
                        <span class="range-value" id="logoWidthValue">180</span>
                    </div>
                </div>

                <div class="form-group">
                    <label>Zoom Effect</label>
                    <div class="range-display">
                        <input type="range" id="zoom" min="1.0" max="1.1" step="0.01" value="1.03" onchange="updateConfig()">
                        <span class="range-value" id="zoomValue">1.03</span>
                    </div>
                </div>

                <div class="form-group">
                    <label>Audio Pitch</label>
                    <div class="range-display">
                        <input type="range" id="pitch" min="0.8" max="1.2" step="0.05" value="1.02" onchange="updateConfig()">
                        <span class="range-value" id="pitchValue">1.02</span>
                    </div>
                </div>
            </div>

            <!-- TICKER PANEL -->
            <div class="panel">
                <h2>📺 Ticker Bar</h2>

                <div class="toggle">
                    <input type="checkbox" id="tickerEnabled" onchange="updateConfig()" checked>
                    <label for="tickerEnabled">Enable Ticker</label>
                </div>

                <div class="form-group">
                    <label>Ticker Text</label>
                    <textarea id="tickerText" onchange="updateConfig()" style="height: 60px; resize: none;">🔥 LIVE Islamic Stream • Welcome Everyone • سبحان الله • LIKE & SUBSCRIBE ❤️</textarea>
                </div>

                <div class="input-row">
                    <div class="form-group">
                        <label>Font Size</label>
                        <div class="range-display">
                            <input type="range" id="tickerSize" min="16" max="48" value="30" onchange="updateConfig()">
                            <span class="range-value" id="tickerSizeValue">30</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Speed</label>
                        <div class="range-display">
                            <input type="range" id="tickerSpeed" min="30" max="150" value="90" onchange="updateConfig()">
                            <span class="range-value" id="tickerSpeedValue">90</span>
                        </div>
                    </div>
                </div>

                <div class="input-row">
                    <div class="form-group">
                        <label>Background Color</label>
                        <div class="color-input-wrapper">
                            <input type="color" id="tickerBg" value="#00ff99" onchange="updateConfig()">
                            <input type="text" id="tickerBgText" value="00ff99" onchange="updateConfig()" placeholder="hex code">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Text Color</label>
                        <div class="color-input-wrapper">
                            <input type="color" id="tickerFg" value="#000000" onchange="updateConfig()">
                            <input type="text" id="tickerFgText" value="000000" onchange="updateConfig()" placeholder="hex code">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Ticker Height (px)</label>
                    <input type="number" id="tickerHeight" value="55" min="30" max="100" onchange="updateConfig()">
                </div>
            </div>

            <!-- STREAM STATUS PANEL -->
            <div class="panel">
                <h2>📊 Stream Status & Export</h2>

                <div id="firebaseStatus" class="status-text">
                    <span class="spinner"></span> Connecting to Firebase...
                </div>

                <div class="form-group" style="margin-top: 16px;">
                    <label>Current Configuration (JSON)</label>
                    <div class="preview-box" id="configPreview" style="height: 200px; font-family: monospace; font-size: 11px;"></div>
                </div>

                <div class="btn-group" style="margin-top: 16px;">
                    <button class="btn" onclick="downloadJSON()">⬇️ Download JSON</button>
                    <button class="btn secondary" onclick="copyToClipboard()">📋 Copy JSON</button>
                    <button class="btn danger" onclick="resetConfig()">🔄 Reset</button>
                </div>

                <div id="messageBox"></div>
            </div>
        </div>
    </div>

    <script>
        // ══════════════════════════════════════════
        // FIREBASE INITIALIZATION
        // ══════════════════════════════════════════
        const firebaseConfig = {
            apiKey: "AIzaSyBbnU8DkthpYQMHOLLyj6M0cc05qXfjMcw",
            authDomain: "ramadan-2385b.firebaseapp.com",
            databaseURL: "https://ramadan-2385b-default-rtdb.firebaseio.com",
            projectId: "ramadan-2385b",
            storageBucket: "ramadan-2385b.firebasestorage.app",
            messagingSenderId: "882828936310",
            appId: "1:882828936310:web:7f97b921031fe130fe4b57"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const playlistRef = db.ref('playlist');

        // ══════════════════════════════════════════
        // SYNC WITH FIREBASE
        // ══════════════════════════════════════════
        playlistRef.on('value', (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                loadUIFromData(data);
                document.getElementById('firebaseStatus').innerHTML = 
                    '✅ Connected to Firebase • Last sync: ' + new Date().toLocaleTimeString();
                document.getElementById('statusBadge').classList.add('online');
                document.getElementById('statusBadge').textContent = 'LIVE';
            } else {
                document.getElementById('firebaseStatus').innerHTML = '⚠️ No data in Firebase yet';
            }
        }, (error) => {
            document.getElementById('firebaseStatus').innerHTML = '❌ Firebase Error: ' + error.message;
            document.getElementById('firebaseStatus').classList.add('error');
        });

        // ══════════════════════════════════════════
        // LOAD UI FROM DATA
        // ══════════════════════════════════════════
        function loadUIFromData(data) {
            // Videos
            if (data.videos) {
                document.getElementById('videoList').innerHTML = '';
                data.videos.forEach((video, idx) => {
                    addVideoToUI(video.url, idx);
                });
            }

            // Logo
            if (data.logo) {
                document.getElementById('logoEnabled').checked = data.logo.enabled;
                document.getElementById('logoPath').value = data.logo.path || '';
                document.getElementById('logoPosition').value = data.logo.position || 'top-right';
                document.getElementById('logoWidth').value = data.logo.width || 180;
                document.getElementById('logoWidthValue').textContent = data.logo.width || 180;
            }

            // Effects
            if (data.effects) {
                document.getElementById('zoom').value = data.effects.zoom || 1.03;
                document.getElementById('zoomValue').textContent = (data.effects.zoom || 1.03).toFixed(2);
                document.getElementById('pitch').value = data.effects.audio_pitch || 1.02;
                document.getElementById('pitchValue').textContent = (data.effects.audio_pitch || 1.02).toFixed(2);
            }

            // Ticker
            if (data.ticker) {
                document.getElementById('tickerEnabled').checked = data.ticker.enabled;
                document.getElementById('tickerText').value = data.ticker.text || '';
                document.getElementById('tickerSize').value = data.ticker.font_size || 30;
                document.getElementById('tickerSizeValue').textContent = data.ticker.font_size || 30;
                document.getElementById('tickerSpeed').value = data.ticker.speed || 90;
                document.getElementById('tickerSpeedValue').textContent = data.ticker.speed || 90;
                document.getElementById('tickerHeight').value = data.ticker.height || 55;

                let bgColor = data.ticker.background_color || '#00ff99';
                bgColor = bgColor.replace('#', '');
                document.getElementById('tickerBg').value = '#' + bgColor;
                document.getElementById('tickerBgText').value = bgColor;

                let fgColor = data.ticker.text_color || '#000000';
                fgColor = fgColor.replace('#', '');
                document.getElementById('tickerFg').value = '#' + fgColor;
                document.getElementById('tickerFgText').value = fgColor;
            }

            updatePreview();
        }

        // ══════════════════════════════════════════
        // UPDATE CONFIG TO FIREBASE
        // ══════════════════════════════════════════
        function updateConfig() {
            const videos = [];
            document.querySelectorAll('.video-item span').forEach(el => {
                const url = el.textContent.trim();
                if (url) videos.push({ url });
            });

            const config = {
                videos: videos,
                logo: {
                    enabled: document.getElementById('logoEnabled').checked,
                    path: document.getElementById('logoPath').value,
                    position: document.getElementById('logoPosition').value,
                    width: parseInt(document.getElementById('logoWidth').value)
                },
                ticker: {
                    enabled: document.getElementById('tickerEnabled').checked,
                    text: document.getElementById('tickerText').value,
                    height: parseInt(document.getElementById('tickerHeight').value),
                    background_color: '#' + document.getElementById('tickerBgText').value,
                    text_color: '#' + document.getElementById('tickerFgText').value,
                    font_size: parseInt(document.getElementById('tickerSize').value),
                    speed: parseInt(document.getElementById('tickerSpeed').value)
                },
                effects: {
                    zoom: parseFloat(document.getElementById('zoom').value),
                    audio_pitch: parseFloat(document.getElementById('pitch').value)
                }
            };

            playlistRef.set(config).then(() => {
                showMessage('✅ Config saved to Firebase!', 'success');
            }).catch(err => {
                showMessage('❌ Error: ' + err.message, 'error');
            });

            updatePreview();
        }

        // ══════════════════════════════════════════
        // ADD VIDEO
        // ══════════════════════════════════════════
        function addVideo() {
            const url = document.getElementById('videoUrl').value.trim();
            if (!url) {
                showMessage('❌ Please enter a video URL', 'error');
                return;
            }

            // Convert YouTube to MP4 download link if needed
            let finalUrl = url;
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                finalUrl = convertYouTubeToDownloadLink(url);
            }

            addVideoToUI(finalUrl);
            document.getElementById('videoUrl').value = '';
            updateConfig();
            showMessage('✅ Video added!', 'success');
        }

        function addVideoToUI(url, index = null) {
            const videoList = document.getElementById('videoList');
            if (videoList.querySelector('p')) videoList.innerHTML = '';

            const item = document.createElement('div');
            item.className = 'video-item';
            item.innerHTML = `
                <span>${url}</span>
                <button class="btn delete-btn danger" onclick="this.parentElement.remove(); updateConfig();">✕</button>
            `;
            videoList.appendChild(item);
        }

        // ══════════════════════════════════════════
        // YOUTUBE CONVERTER
        // ══════════════════════════════════════════
        function convertYouTubeToDownloadLink(youtubeUrl) {
            // Extract video ID
            let videoId = '';
            if (youtubeUrl.includes('youtube.com/live/')) {
                videoId = youtubeUrl.split('youtube.com/live/')[1].split('?')[0];
            } else if (youtubeUrl.includes('youtu.be/')) {
                videoId = youtubeUrl.split('youtu.be/')[1].split('?')[0];
            }

            if (!videoId) return youtubeUrl;

            // Return yt-dlp compatible format (requires backend)
            // For now, return placeholder that stream.sh can handle
            return `https://youtube.com/live/${videoId}`;
        }

        function downloadYouTubeAsMP4() {
            showMessage('⚠️ Requires backend server with yt-dlp installed. Check documentation.', 'error');
            // In production, this would call a backend API to download YouTube video
        }

        // ══════════════════════════════════════════
        // PREVIEW & EXPORT
        // ══════════════════════════════════════════
        function updatePreview() {
            const videos = [];
            document.querySelectorAll('.video-item span').forEach(el => {
                videos.push({ url: el.textContent.trim() });
            });

            const config = {
                videos,
                logo: {
                    enabled: document.getElementById('logoEnabled').checked,
                    path: document.getElementById('logoPath').value,
                    position: document.getElementById('logoPosition').value,
                    width: parseInt(document.getElementById('logoWidth').value)
                },
                ticker: {
                    enabled: document.getElementById('tickerEnabled').checked,
                    text: document.getElementById('tickerText').value,
                    height: parseInt(document.getElementById('tickerHeight').value),
                    background_color: '#' + document.getElementById('tickerBgText').value,
                    text_color: '#' + document.getElementById('tickerFgText').value,
                    font_size: parseInt(document.getElementById('tickerSize').value),
                    speed: parseInt(document.getElementById('tickerSpeed').value)
                },
                effects: {
                    zoom: parseFloat(document.getElementById('zoom').value),
                    audio_pitch: parseFloat(document.getElementById('pitch').value)
                }
            };

            document.getElementById('configPreview').textContent = JSON.stringify(config, null, 2);
        }

        function downloadJSON() {
            const config = document.getElementById('configPreview').textContent;
            const blob = new Blob([config], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'playlist.json';
            a.click();
        }

        function copyToClipboard() {
            const config = document.getElementById('configPreview').textContent;
            navigator.clipboard.writeText(config).then(() => {
                showMessage('✅ Copied to clipboard!', 'success');
            });
        }

        function resetConfig() {
            if (confirm('Reset all settings?')) {
                document.getElementById('logoEnabled').checked = true;
                document.getElementById('tickerEnabled').checked = true;
                updateConfig();
                showMessage('🔄 Config reset!', 'success');
            }
        }

        // ══════════════════════════════════════════
        // RANGE VALUE UPDATES
        // ══════════════════════════════════════════
        document.getElementById('logoWidth').addEventListener('input', (e) => {
            document.getElementById('logoWidthValue').textContent = e.target.value;
        });

        document.getElementById('zoom').addEventListener('input', (e) => {
            document.getElementById('zoomValue').textContent = parseFloat(e.target.value).toFixed(2);
        });

        document.getElementById('pitch').addEventListener('input', (e) => {
            document.getElementById('pitchValue').textContent = parseFloat(e.target.value).toFixed(2);
        });

        document.getElementById('tickerSize').addEventListener('input', (e) => {
            document.getElementById('tickerSizeValue').textContent = e.target.value;
        });

        document.getElementById('tickerSpeed').addEventListener('input', (e) => {
            document.getElementById('tickerSpeedValue').textContent = e.target.value;
        });

        document.getElementById('tickerBg').addEventListener('input', (e) => {
            document.getElementById('tickerBgText').value = e.target.value.replace('#', '');
        });

        document.getElementById('tickerBgText').addEventListener('input', (e) => {
            document.getElementById('tickerBg').value = '#' + e.target.value;
        });

        document.getElementById('tickerFg').addEventListener('input', (e) => {
            document.getElementById('tickerFgText').value = e.target.value.replace('#', '');
        });

        document.getElementById('tickerFgText').addEventListener('input', (e) => {
            document.getElementById('tickerFg').value = '#' + e.target.value;
        });

        // ══════════════════════════════════════════
        // MESSAGES
        // ══════════════════════════════════════════
        function showMessage(msg, type) {
            const box = document.getElementById('messageBox');
            box.innerHTML = `<div class="${type}">${msg}</div>`;
            setTimeout(() => box.innerHTML = '', 4000);
        }

        // Load initial data
        updatePreview();
    </script>
</body>
</html>
