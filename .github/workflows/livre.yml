name: 24-7 YouTube Live Stream (YouTube + MP4)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            ffmpeg \
            jq \
            wget \
            fonts-dejavu-core \
            python3-pip
          
          # Install yt-dlp for YouTube stream capture
          pip install yt-dlp --quiet

      - name: Verify Stream Key
        run: |
          if [ -z "${{ secrets.YOUTUBE_STREAM_KEY }}" ]; then
            echo "ERROR: YOUTUBE_STREAM_KEY secret is not set!"
            exit 1
          fi
          echo "Stream key found. OK."

      - name: Verify Playlist
        run: |
          if [ ! -f "playlist.json" ]; then
            echo "ERROR: playlist.json not found!"
            exit 1
          fi
          jq . playlist.json > /dev/null
          echo "Playlist validated. OK."

      - name: Create Temp Directories
        run: |
          mkdir -p /tmp/mitv_stream/cache
          chmod -R 777 /tmp/mitv_stream

      - name: Start Live Stream
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          chmod +x stream.sh
          bash stream.sh

      - name: Cleanup on Failure
        if: failure()
        run: |
          rm -rf /tmp/mitv_stream/cache/*
          echo "Cache cleaned on failure"
