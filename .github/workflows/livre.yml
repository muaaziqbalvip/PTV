name: 24/7 YouTube Live Stream (Pro)

on:
  workflow_dispatch:
    inputs:
      logo_url:
        description: 'Logo image URL (PNG with transparency preferred)'
        required: false
        default: 'https://i.ibb.co/gZFSmCPw/file-00000000305071fa945b58b012ac072b-removebg-preview.png'
      logo_position:
        description: 'Logo position: topleft / topright / bottomleft / bottomright'
        required: false
        default: 'topright'
      quality_preset:
        description: 'Quality: low (1080p/3Mbps) | mid (1080p/4.5Mbps) | high (1080p/6Mbps)'
        required: false
        default: 'mid'
  schedule:
    - cron: '0 */5 * * *'

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    env:
      STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
      RTMP_URL: 'rtmp://a.rtmp.youtube.com/live2'
      LOGO_URL: ${{ github.event.inputs.logo_url || 'https://i.ibb.co/gZFSmCPw/file-00000000305071fa945b58b012ac072b-removebg-preview.png' }}
      LOGO_POS: ${{ github.event.inputs.logo_position || 'topright' }}
      QUALITY:  ${{ github.event.inputs.quality_preset || 'mid' }}

    steps:
      # ─── 1. FFmpeg install ──────────────────────────────────────────────────
      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg curl

      # ─── 2. Download logo ───────────────────────────────────────────────────
      - name: Download Logo
        run: |
          curl -sL "$LOGO_URL" -o logo_raw.png || true

          # Agar logo download fail ho to fallback transparent 1x1 pixel
          if [ ! -s logo_raw.png ]; then
            echo "Logo download fail — fallback use ho raha hai"
            ffmpeg -f lavfi -i color=black@0:size=1x1:rate=1 \
              -frames:v 1 logo_raw.png -y -loglevel quiet
          fi

          # Logo ko resize karo: max 180px wide, aspect ratio preserve
          ffmpeg -i logo_raw.png \
            -vf "scale='min(280,iw)':-1:flags=lanczos" \
            logo.png -y -loglevel quiet

          echo "=== Logo ready ==="
          file logo.png

      # ─── 3. Quality settings set karo ──────────────────────────────────────
      - name: Set Quality Params
        run: |
          case "$QUALITY" in
            low)
              echo "VBR=3000k"    >> $GITHUB_ENV
              echo "MAXR=3000k"   >> $GITHUB_ENV
              echo "BUFS=6000k"   >> $GITHUB_ENV
              echo "PRESET=faster" >> $GITHUB_ENV
              ;;
            high)
              echo "VBR=6000k"    >> $GITHUB_ENV
              echo "MAXR=6000k"   >> $GITHUB_ENV
              echo "BUFS=12000k"  >> $GITHUB_ENV
              echo "PRESET=fast"  >> $GITHUB_ENV
              ;;
            *)  # mid (default)
              echo "VBR=4500k"    >> $GITHUB_ENV
              echo "MAXR=4500k"   >> $GITHUB_ENV
              echo "BUFS=9000k"   >> $GITHUB_ENV
              echo "PRESET=veryfast" >> $GITHUB_ENV
              ;;
          esac

      # ─── 4. Logo position calculate karo ───────────────────────────────────
      - name: Set Logo Overlay Position
        run: |
          case "$LOGO_POS" in
            topleft)     echo "OVERLAY_POS=20:20"          >> $GITHUB_ENV ;;
            bottomleft)  echo "OVERLAY_POS=20:H-h-20"      >> $GITHUB_ENV ;;
            bottomright) echo "OVERLAY_POS=W-w-20:H-h-20"  >> $GITHUB_ENV ;;
            *)           echo "OVERLAY_POS=W-w-20:20"      >> $GITHUB_ENV ;;  # topright default
          esac

      # ─── 5. Playlist banao ─────────────────────────────────────────────────
      - name: Build Playlist
        run: |
          cat > playlist.txt << 'PLAYLIST'
          file 'https://www.dropbox.com/scl/fi/zv7z1sbm81ohxp04a5anx/lv_0_20260529230011.mp4?rlkey=gpuytnfr9wtp2yc1mzn5l0hil&st=4woqwd9c&raw=1'
          file 'https://www.dropbox.com/scl/fi/zv7z1sbm81ohxp04a5anx/lv_0_20260529230011.mp4?rlkey=gpuytnfr9wtp2yc1mzn5l0hil&st=4woqwd9c&raw=1'
          PLAYLIST

          echo "=== Playlist ==="
          cat playlist.txt

      # ─── 6. Infinite loop stream with logo overlay ─────────────────────────
      - name: Start 24/7 HD Stream with Logo
        run: |
          echo "=============================="
          echo "Stream shuru: $(date)"
          echo "Quality: $QUALITY | Bitrate: $VBR"
          echo "Logo Position: $LOGO_POS ($OVERLAY_POS)"
          echo "=============================="

          FAIL_COUNT=0

          while true; do
            ffmpeg \
              -re \
              -stream_loop -1 \
              -f concat \
              -safe 0 \
              -protocol_whitelist file,http,https,tcp,tls,crypto \
              -i playlist.txt \
              -i logo.png \
              -filter_complex \
                "[0:v]scale=1920:1080:force_original_aspect_ratio=decrease,\
                 pad=1920:1080:(ow-iw)/2:(oh-ih)/2:black,\
                 setsar=1,fps=30[base];\
                 [1:v]format=rgba,colorchannelmixer=aa=0.85[logo];\
                 [base][logo]overlay=${OVERLAY_POS}:format=auto[outv]" \
              -map "[outv]" \
              -map 0:a \
              -c:v libx264 \
              -preset "$PRESET" \
              -tune zerolatency \
              -profile:v high \
              -level 4.2 \
              -b:v "$VBR" \
              -maxrate "$MAXR" \
              -bufsize "$BUFS" \
              -g 60 \
              -keyint_min 60 \
              -sc_threshold 0 \
              -pix_fmt yuv420p \
              -c:a aac \
              -b:a 160k \
              -ar 44100 \
              -ac 2 \
              -flvflags no_duration_filesize \
              -f flv \
              "${RTMP_URL}/${STREAM_KEY}" \
              2>&1 | tee -a stream.log

            EXIT_CODE=${PIPESTATUS[0]}
            FAIL_COUNT=$((FAIL_COUNT + 1))
            echo "[$(date)] FFmpeg exit code: $EXIT_CODE — Restart #$FAIL_COUNT"

            # Zyada failures pe thoda zyada wait (network issue ho sakta hai)
            if [ "$FAIL_COUNT" -gt 5 ]; then
              echo "Zyada failures — 30s wait..."
              sleep 30
            else
              sleep 5
            fi
          done

      # ─── 7. Log upload ──────────────────────────────────────────────────────
      - name: Upload Stream Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stream-log-${{ github.run_number }}
          path: stream.log
          retention-days: 3