name: 24/7 YouTube Live Stream

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Install FFmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg wget

      - name: Download Logo
        run: |
          wget -q "https://i.ibb.co/gZFSmCPw/file-00000000305071fa945b58b012ac072b-removebg-preview.png" -O logo.png || echo "Logo download fail, bina logo stream hoga"

      - name: Build Playlist
        run: |
          cat > playlist.txt << 'PLAYLIST'
file 'https://www.dropbox.com/scl/fi/zv7z1sbm81ohxp04a5anx/lv_0_20260529230011.mp4?rlkey=gpuytnfr9wtp2yc1mzn5l0hil&st=3v3g7vuz&raw=1'
file 'https://www.dropbox.com/scl/fi/zv7z1sbm81ohxp04a5anx/lv_0_20260529230011.mp4?rlkey=gpuytnfr9wtp2yc1mzn5l0hil&st=3v3g7vuz&raw=1'
file 'https://www.dropbox.com/scl/fi/zv7z1sbm81ohxp04a5anx/lv_0_20260529230011.mp4?rlkey=gpuytnfr9wtp2yc1mzn5l0hil&st=3v3g7vuz&raw=1'
PLAYLIST
          cat playlist.txt

      - name: Start Stream
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          while true; do
            if [ -f logo.png ]; then
              ffmpeg -re -stream_loop -1 -f concat -safe 0 \
                -protocol_whitelist file,http,https,tcp,tls,crypto \
                -i playlist.txt \
                -i logo.png \
                -filter_complex "[0:v]scale=1920:1080:force_original_aspect_ratio=decrease,pad=1920:1080:(ow-iw)/2:(oh-ih)/2:black,setsar=1,fps=60[base];[1:v]scale=150:-1:flags=lanczos[logo];[base][logo]overlay=W-w-20:20:format=auto[vout]" \
                -map "[vout]" -map 0:a \
                -c:v libx264 -preset faster -tune zerolatency \
                -profile:v high -level 4.2 \
                -b:v 6000k -maxrate 6000k -bufsize 12000k \
                -g 120 -keyint_min 120 -sc_threshold 0 \
                -pix_fmt yuv420p \
                -c:a aac -b:a 192k -ar 48000 -ac 2 \
                -f flv "rtmp://a.rtmp.youtube.com/live2/${STREAM_KEY}" \
                2>&1 | tee -a stream.log
            else
              ffmpeg -re -stream_loop -1 -f concat -safe 0 \
                -protocol_whitelist file,http,https,tcp,tls,crypto \
                -i playlist.txt \
                -vf "scale=1920:1080:force_original_aspect_ratio=decrease,pad=1920:1080:(ow-iw)/2:(oh-ih)/2:black,setsar=1,fps=60" \
                -c:v libx264 -preset faster -tune zerolatency \
                -profile:v high -level 4.2 \
                -b:v 6000k -maxrate 6000k -bufsize 12000k \
                -g 120 -keyint_min 120 -sc_threshold 0 \
                -pix_fmt yuv420p \
                -c:a aac -b:a 192k -ar 48000 -ac 2 \
                -f flv "rtmp://a.rtmp.youtube.com/live2/${STREAM_KEY}" \
                2>&1 | tee -a stream.log
            fi
            echo "Restart ho raha hai 5 sec mein..."
            sleep 5
          done

      - name: Upload Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stream-log-${{ github.run_number }}
          path: stream.log
          retention-days: 3