name: 24-7 YouTube Live Stream

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg jq wget fonts-dejavu-core

      - name: Verify Stream Key
        run: |
          if [ -z "${{ secrets.YOUTUBE_STREAM_KEY }}" ]; then
            echo "ERROR: YOUTUBE_STREAM_KEY secret is not set!"
            exit 1
          fi
          echo "Stream key found. OK."

      - name: Start Live Stream
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          chmod +x stream.sh
          bash stream.sh
