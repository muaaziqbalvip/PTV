name: 24/7 YouTube Live Stream

on:
  workflow_dispatch:        # manual start
  schedule:
    - cron: '0 */5 * * *'  # auto-restart har 5 ghante (GitHub 6h limit se pehle)

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350    # ~5h 50min

    env:
      STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
      RTMP_URL: 'rtmp://a.rtmp.youtube.com/live2'

    steps:
      # â”€â”€â”€ 1. FFmpeg install â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      # â”€â”€â”€ 2. Playlist â€” APNE MP4 LINKS YAHAN DAALO â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Build playlist
        run: |
          cat > playlist.txt << 'PLAYLIST'
          file 'https://www.dropbox.com/scl/fi/kcbptz83amymszl3v6jyj/lv_0_20260530002656.mp4?rlkey=x5cpl50duxvka6izjkahjkkzw&st=cj5xf84m&raw=1'
          file 'https://www.dropbox.com/scl/fi/zv7z1sbm81ohxp04a5anx/lv_0_20260529230011.mp4?rlkey=gpuytnfr9wtp2yc1mzn5l0hil&st=4woqwd9c&raw=1'
          file 'https://www.dropbox.com/scl/fi/kcbptz83amymszl3v6jyj/lv_0_20260530002656.mp4?rlkey=x5cpl50duxvka6izjkahjkkzw&st=cj5xf84m&raw=1'
          PLAYLIST

          echo "=== Playlist ==="
          cat playlist.txt

      # â”€â”€â”€ 3. Infinite loop stream â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Start 24/7 HD Stream
        run: |
          echo "Stream shuru ho raha hai..."
          while true; do
            ffmpeg \
              -re \
              -stream_loop -1 \
              -f concat \
              -safe 0 \
              -protocol_whitelist file,http,https,tcp,tls,crypto \
              -i playlist.txt \
              -vf "scale=1920:1080:force_original_aspect_ratio=decrease,pad=1920:1080:(ow-iw)/2:(oh-ih)/2:black" \
              -c:v libx264 \
              -preset veryfast \
              -tune zerolatency \
              -b:v 4500k \
              -maxrate 4500k \
              -bufsize 9000k \
              -g 60 \
              -keyint_min 60 \
              -sc_threshold 0 \
              -c:a aac \
              -b:a 160k \
              -ar 44100 \
              -ac 2 \
              -f flv \
              "${RTMP_URL}/${STREAM_KEY}" \
              2>&1 | tee -a stream.log
            echo "FFmpeg band hua â€” 5 second baad restart..."
            sleep 5
          done

      # â”€â”€â”€ 4. Log (debug ke liye) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Upload stream log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stream-log-${{ github.run_number }}
          path: stream.log
          retention-days: 3