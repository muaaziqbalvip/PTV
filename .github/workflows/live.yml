# â•‘     Smooth Loop Â· Logo Overlay Â· Auto-Restart Â· HD Quality      â•‘
# â•šâ•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•

name: ðŸŽ¬ 24/7 YouTube Live Stream (Pro)

on:
  # â”€â”€ Manual trigger with custom options â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  workflow_dispatch:
    inputs:
      logo_url:
        description: 'ðŸ–¼ï¸  Logo URL (PNG transparent preferred)'
        required: false
        default: 'https://i.ibb.co/gZFSmCPw/file-00000000305071fa945b58b012ac072b-removebg-preview.png'
      logo_position:
        description: 'ðŸ“Œ Logo position: topleft / topright / bottomleft / bottomright'
        required: false
        default: 'topright'
      quality_preset:
        description: 'âš™ï¸  Quality: low (3Mbps) | mid (4.5Mbps) | high (6Mbps)'
        required: false
        default: 'mid'

  # â”€â”€ Auto-restart every 5 hours â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  schedule:
    - cron: '0 */5 * * *'

# â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
jobs:
  stream:
    name: ðŸ“¡ Live Stream Job
    runs-on: ubuntu-latest
    timeout-minutes: 350

    env:
      STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
      RTMP_URL:   'rtmp://a.rtmp.youtube.com/live2'
      LOGO_URL:   ${{ github.event.inputs.logo_url || 'https://i.ibb.co/gZFSmCPw/file-00000000305071fa945b58b012ac072b-removebg-preview.png' }}
      LOGO_POS:   ${{ github.event.inputs.logo_position || 'topright' }}
      QUALITY:    ${{ github.event.inputs.quality_preset || 'mid' }}

    steps:

      # â”€â”€ Step 1: System Setup â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: ðŸ”§ Install FFmpeg & Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg curl
          echo "âœ… FFmpeg version: $(ffmpeg -version 2>&1 | head -1)"

      # â”€â”€ Step 2: Download & Prepare Logo â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: ðŸ–¼ï¸  Prepare Logo Overlay
        run: |
          echo "â¬‡ï¸  Logo download ho raha hai..."
          curl -sL "$LOGO_URL" -o logo_raw.png || true

          # Fallback: agar logo fail ho to transparent pixel use karo
          if [ ! -s logo_raw.png ]; then
            echo "âš ï¸  Logo download fail â€” transparent fallback use ho raha hai"
            ffmpeg -f lavfi -i color=black@0:size=1x1:rate=1 \
              -frames:v 1 logo_raw.png -y -loglevel quiet
          fi

          # Logo resize: max 280px wide, aspect ratio sahi rakho
          ffmpeg -i logo_raw.png \
            -vf "scale='min(280,iw)':-1:flags=lanczos" \
            logo.png -y -loglevel quiet

          echo "âœ… Logo ready: $(file logo.png)"

      # â”€â”€ Step 3: Quality Configuration â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: âš™ï¸  Configure Quality Settings
        run: |
          echo "ðŸŽšï¸  Quality preset: $QUALITY"
          case "$QUALITY" in
            low)
              echo "VBR=3000k"       >> $GITHUB_ENV
              echo "MAXR=3500k"      >> $GITHUB_ENV
              echo "BUFS=6000k"      >> $GITHUB_ENV
              echo "PRESET=faster"   >> $GITHUB_ENV
              echo "LABEL=ðŸŸ¡ LOW (1080p / 3 Mbps)"  >> $GITHUB_ENV
              ;;
            high)
              echo "VBR=6000k"       >> $GITHUB_ENV
              echo "MAXR=6500k"      >> $GITHUB_ENV
              echo "BUFS=12000k"     >> $GITHUB_ENV
              echo "PRESET=fast"     >> $GITHUB_ENV
              echo "LABEL=ðŸŸ¢ HIGH (1080p / 6 Mbps)" >> $GITHUB_ENV
              ;;
            *)  # mid = default
              echo "VBR=4500k"       >> $GITHUB_ENV
              echo "MAXR=5000k"      >> $GITHUB_ENV
              echo "BUFS=9000k"      >> $GITHUB_ENV
              echo "PRESET=veryfast" >> $GITHUB_ENV
              echo "LABEL=ðŸ”µ MID (1080p / 4.5 Mbps)" >> $GITHUB_ENV
              ;;
          esac

      # â”€â”€ Step 4: Logo Position Setup â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: ðŸ“Œ Set Logo Position
        run: |
          case "$LOGO_POS" in
            topleft)     echo "OVERLAY_POS=20:20"         >> $GITHUB_ENV ;;
            bottomleft)  echo "OVERLAY_POS=20:H-h-20"     >> $GITHUB_ENV ;;
            bottomright) echo "OVERLAY_POS=W-w-20:H-h-20" >> $GITHUB_ENV ;;
            *)           echo "OVERLAY_POS=W-w-20:20"     >> $GITHUB_ENV ;;
          esac
          echo "âœ… Logo position set: $LOGO_POS"

      # â”€â”€ Step 5: Build Video Playlist â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: ðŸ“‹ Build Playlist
        run: |
          # âš ï¸  FIX: stream_loop -1 aur concat saath conflict karta tha
          # Solution: playlist mein videos ko manually repeat karo
          # Yeh ensure karta hai seamless looping bina cut ke

          cat > playlist.txt << 'EOF'
          file 'https://mividstore.netlify.app/videoplayback%20(1).mp4'
