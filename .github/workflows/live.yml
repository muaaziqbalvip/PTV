          file 'https://muaaziqbalvip.github.io/Milive2/0.mp4'
          EOF

          echo "âœ… Playlist ready â€” $(grep -c '^' playlist.txt) entries"

      # â”€â”€ Step 6: ðŸ”´ LIVE STREAM (Main Step) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: ðŸ”´ Start 24/7 HD Live Stream
        run: |
          echo "â•”â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•—"
          echo "â•‘        ðŸŽ¬ STREAM STARTING...             â•‘"
          echo "â• â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•£"
          echo "â•‘  ðŸ“… Time    : $(date '+%Y-%m-%d %H:%M:%S UTC') â•‘"
          echo "â•‘  ðŸŽšï¸  Quality : $LABEL"
          echo "â•‘  ðŸ“Œ Logo    : $LOGO_POS ($OVERLAY_POS)   â•‘"
          echo "â•šâ•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•"

          FAIL_COUNT=0
          TOTAL_RESTARTS=0

          while true; do

            echo ""
            echo "â–¶ï¸  FFmpeg stream start â€” $(date '+%H:%M:%S')"
            echo "   Restart #$TOTAL_RESTARTS | Fail streak: $FAIL_COUNT"
            echo "â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€"

            ffmpeg \
              -re \
              -f concat \
              -safe 0 \
              -protocol_whitelist file,http,https,tcp,tls,crypto \
              -i playlist.txt \
              -i logo.png \
              -filter_complex \
                "[0:v]scale=1920:1080:force_original_aspect_ratio=decrease,\
                 pad=1920:1080:(ow-iw)/2:(oh-ih)/2:black,\
                 setsar=1,\
                 fps=fps=30[base];\
                 [1:v]format=rgba,colorchannelmixer=aa=0.85[logo];\
                 [base][logo]overlay=${OVERLAY_POS}:format=auto[outv]" \
              -map "[outv]" \
              -map 0:a \
              -c:v libx264 \
              -preset "$PRESET" \
              -tune zerolatency \
              -profile:v high \
              -level:v 4.2 \
              -b:v "$VBR" \
              -maxrate "$MAXR" \
              -bufsize "$BUFS" \
              -g 60 \
              -keyint_min 60 \
              -sc_threshold 0 \
              -pix_fmt yuv420p \
              -c:a aac \
              -b:a 160k \
              -ar 44100 \
              -ac 2 \
              -avoid_negative_ts make_zero \
              -fflags +genpts+igndts \
              -flvflags no_duration_filesize \
              -f flv \
              "${RTMP_URL}/${STREAM_KEY}" \
              2>&1 | tee -a stream.log

            EXIT_CODE=${PIPESTATUS[0]}
            TOTAL_RESTARTS=$((TOTAL_RESTARTS + 1))

            # â”€â”€ Exit code handle karo â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
            if [ "$EXIT_CODE" -eq 0 ]; then
              # Playlist khatam ho gayi â€” seedha restart (no wait needed)
              echo "âœ… Playlist complete â€” looping back instantly"
              FAIL_COUNT=0
              sleep 1

            else
              # Koi error aayi â€” smart backoff
              FAIL_COUNT=$((FAIL_COUNT + 1))
              echo "âš ï¸  FFmpeg crashed (exit: $EXIT_CODE) â€” Fail #$FAIL_COUNT"

              if   [ "$FAIL_COUNT" -ge 10 ]; then
                echo "ðŸ”´ Too many failures â€” 60s wait..."
                sleep 60
              elif [ "$FAIL_COUNT" -ge 5 ]; then
                echo "ðŸŸ¡ Multiple failures â€” 30s wait..."
                sleep 30
              else
                echo "ðŸŸ¢ Retrying in 5s..."
                sleep 5
              fi
            fi

          done

      # â”€â”€ Step 7: Upload Logs â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: ðŸ“„ Upload Stream Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stream-log-${{ github.run_number }}
          path: stream.log
          retention-days: 3