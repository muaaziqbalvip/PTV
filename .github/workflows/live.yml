name: 🌟 MiTV Network Pro (Secure Groq)

on:
  schedule:
    - cron: '0 */4 * * *' # Har 4 ghante baad auto-refresh
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  mitv-run:
    runs-on: ubuntu-latest
    name: MiTV Core Engine
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install Dependencies
        run: |
          pip install python-telegram-bot==20.8 firebase-admin groq

      - name: 🚀 Start MiTV OS (24/7 Mode)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PYTHONUNBUFFERED: 1
        run: |
          echo "===================================================="
          echo "🏢 ORGANIZATION: MUSLIM ISLAM"
          echo "👨‍💻 FOUNDER: MUAAZ IQBAL (KASUR)"
          echo "🤖 STATUS: GROQ AI SECURED"
          echo "===================================================="
          
          while true; do
            echo "🕒 Engine Started: $(date)"
            python bot.py || echo "⚠️ Restarting..."
            sleep 10
          done
