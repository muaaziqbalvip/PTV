name: Telegram Proxy Runner

on:
  schedule:
    - cron: '0 */6 * * *' # Har 6 ghante baad auto-restart hoga
  workflow_dispatch: # Manual start karne ke liye

jobs:
  run-proxy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python_version: '3.10'

      - name: Install Dependencies
        run: |
          pip install python-telegram-bot # Ya jo bhi proxy library aap use karein
          pip install cryptography uvloop

      - name: Run Proxy Script
        run: python proxy_script.py
        env:
          TG_SECRET: ${{ secrets.TG_SECRET }}
